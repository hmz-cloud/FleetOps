<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fleet Ops — Operations Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d14;--bg2:#12151f;--bg3:#181c29;--bg4:#1f2335;--bg5:#252a3d;
  --border:#252a3d;--border2:#313757;--border3:#3d4468;
  --text:#e2e5f3;--text2:#8b92b8;--text3:#555e84;--text4:#363d5c;
  --accent:#4f8ef7;--accent2:#7aaeff;--accent-bg:rgba(79,142,247,0.1);--accent-border:rgba(79,142,247,0.3);
  --green:#2ecc71;--green2:#27ae60;--green-bg:rgba(46,204,113,0.1);--green-border:rgba(46,204,113,0.3);
  --amber:#f39c12;--amber2:#e67e22;--amber-bg:rgba(243,156,18,0.1);--amber-border:rgba(243,156,18,0.3);
  --red:#e74c3c;--red2:#c0392b;--red-bg:rgba(231,76,60,0.1);--red-border:rgba(231,76,60,0.3);
  --purple:#9b59b6;--purple2:#8e44ad;--purple-bg:rgba(155,89,182,0.1);--purple-border:rgba(155,89,182,0.3);
  --teal:#1abc9c;--teal-bg:rgba(26,188,156,0.1);
  --sidebar:240px;--topbar:58px;
  --r:10px;--rs:6px;--rl:14px;
  font-family:'DM Sans',sans-serif;font-size:14px;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;outline:none;border:none}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100;transition:transform .25s}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
.topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:90;gap:16px}
.content{flex:1;padding:24px;min-height:calc(100vh - var(--topbar))}

/* ── SIDEBAR ── */
.logo{padding:18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#4f8ef7,#7b5ea7);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(79,142,247,0.3)}
.logo-mark svg{width:18px;height:18px;fill:white}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-name span{color:var(--accent2)}
.logo-ver{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:10px 10px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:400;color:var(--text2);transition:all .15s;margin-bottom:1px;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent2);font-weight:500;border:1px solid var(--accent-border)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:600;padding:1px 6px;border-radius:100px;min-width:18px;text-align:center}
.nav-badge.amber{background:var(--amber)}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border)}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0}
.user-name{font-size:12.5px;font-weight:500}
.user-role{font-size:11px;color:var(--text3)}

/* ── TOPBAR ── */
.page-info{}
.page-title{font-size:14px;font-weight:600}
.page-sub{font-size:11.5px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.search-box{position:relative}
.search-box input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:7px 12px 7px 34px;font-size:13px;color:var(--text);width:220px;transition:all .2s}
.search-box input:focus{border-color:var(--accent);width:260px;background:var(--bg4)}
.search-box input::placeholder{color:var(--text3)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none}
.icon-btn{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:all .15s;position:relative;flex-shrink:0}
.icon-btn:hover{background:var(--bg4);border-color:var(--border3);color:var(--text)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-primary{background:var(--accent);color:white;border:1px solid transparent}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{background:var(--bg3);border-color:var(--border3);color:var(--text)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.btn-danger:hover{background:rgba(231,76,60,0.2)}
.btn-success{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.card-sm{padding:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13.5px;font-weight:600;color:var(--text)}
.card-sub{font-size:11.5px;color:var(--text3);margin-top:2px}
.card-actions{display:flex;align-items:center;gap:6px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
.stat:hover{border-color:var(--border2)}
.stat-top{display:flex;align-items:center;justify-content:space-between}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:18px;height:18px}
.stat-trend{font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px}
.stat-trend.up{color:var(--green)}
.stat-trend.down{color:var(--red)}
.stat-trend.neutral{color:var(--text3)}
.stat-label{font-size:11.5px;color:var(--text3)}
.stat-value{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px;color:var(--text);line-height:1}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}.badge-green::before{background:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}.badge-amber::before{background:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}.badge-red::before{background:var(--red)}
.badge-blue{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent-border)}.badge-blue::before{background:var(--accent2)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}.badge-gray::before{background:var(--text3)}
.badge-purple{background:var(--purple-bg);color:var(--purple2);border:1px solid var(--purple-border)}.badge-purple::before{background:var(--purple)}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(26,188,156,0.3)}.badge-teal::before{background:var(--teal)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 14px;font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.tbl-primary{font-weight:500;color:var(--text)}
.tbl-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── GRID LAYOUTS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g-main{display:grid;grid-template-columns:1fr 290px;gap:16px}
.g-main3{display:grid;grid-template-columns:1fr 1fr 290px;gap:16px}
.stack{display:flex;flex-direction:column;gap:16px}
.gap8{gap:8px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}

/* ── VEHICLE CARDS ── */
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:all .2s;cursor:default}
.vcard:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.vcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.vcard-icon{width:40px;height:40px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vcard-icon svg{width:20px;height:20px;color:var(--text3)}
.vcard-id{font-size:13.5px;font-weight:600;color:var(--text)}
.vcard-fleet{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.vcard-rows{display:flex;flex-direction:column;gap:6px;font-size:12px;margin-bottom:14px}
.vcard-row{display:flex;justify-content:space-between;align-items:center}
.vcard-k{color:var(--text3)}
.vcard-v{color:var(--text2);font-weight:500;text-align:right;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-bar{width:100%;height:4px;background:var(--bg4);border-radius:100px;overflow:hidden;margin-top:10px;margin-bottom:14px}
.progress-fill{height:100%;border-radius:100px;transition:width .3s}
.vcard-btns{display:flex;gap:6px}
.vcard-btn{flex:1;padding:6px 8px;font-size:12px;font-weight:500;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.vcard-btn:hover{background:var(--bg5);border-color:var(--border3);color:var(--text)}
.vcard-btn.red{color:var(--red);border-color:var(--red-border)}.vcard-btn.red:hover{background:var(--red-bg)}
.vcard-btn.blue{color:var(--accent2);border-color:var(--accent-border)}.vcard-btn.blue:hover{background:var(--accent-bg)}

/* ── TRANSFER CARD ── */
.tcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;transition:border-color .15s}
.tcard:hover{border-color:var(--border2)}
.tcard-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.tcard-vehicle{display:flex;align-items:center;gap:10px}
.tcard-icon{width:36px;height:36px;background:var(--bg4);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcard-icon svg{width:17px;height:17px;color:var(--text3)}
.route{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2);flex-wrap:wrap}
.route svg{width:12px;height:12px;color:var(--text3);flex-shrink:0}
.tcard-meta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--text3);padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;gap:4px}

/* ── MAINTENANCE ── */
.maint-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.maint-item:last-child{border-bottom:none}
.maint-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.maint-icon svg{width:17px;height:17px}
.maint-info{flex:1;min-width:0}
.maint-name{font-size:13px;font-weight:500;color:var(--text)}
.maint-desc{font-size:11.5px;color:var(--text3);margin-top:2px}
.maint-date{font-size:11.5px;font-weight:500;text-align:right;white-space:nowrap}

/* ── DRIVER CARDS ── */
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:all .2s}
.dcard:hover{border-color:var(--border2);background:var(--bg3)}
.dcard-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;flex-shrink:0}
.dcard-name{font-size:13.5px;font-weight:600;color:var(--text)}
.dcard-id{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.dcard-rows{display:flex;flex-direction:column;gap:6px;font-size:12px;margin-bottom:12px}

/* ── ANALYTICS ── */
.chart-wrap{position:relative;width:100%;height:180px;margin-top:8px}
canvas{display:block}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-canvas{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px;font-size:12px}
.legend-row{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{color:var(--text2)}
.legend-val{margin-left:auto;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}

/* ── ALERTS / NOTIF ── */
.alert-panel{position:fixed;top:var(--topbar);right:0;width:340px;background:var(--bg2);border-left:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 0 0 var(--rl);z-index:80;padding:16px;display:none;max-height:calc(100vh - var(--topbar));overflow-y:auto}
.alert-panel.open{display:block}
.alert-panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.notif-item{display:flex;gap:10px;padding:10px;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--accent-bg);border-color:var(--accent-border)}
.notif-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon svg{width:15px;height:15px}
.notif-title{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:2px}
.notif-msg{font-size:11.5px;color:var(--text3);line-height:1.4}
.notif-time{font-size:10.5px;color:var(--text3);margin-top:3px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all .15s}
.filter-chip:hover{border-color:var(--border3);color:var(--text2)}
.filter-chip.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2)}
.filter-right{margin-left:auto;display:flex;gap:8px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.6)}
.modal-hd{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:14.5px;font-weight:600}
.modal-x{width:28px;height:28px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s}
.modal-x:hover{border-color:var(--border2);color:var(--text)}
.modal-body{padding:20px 22px}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2)}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.req{color:var(--red);font-size:10px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--text);transition:all .15s}
.form-input:focus{border-color:var(--accent);background:var(--bg4)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:70px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text3);margin-top:3px}
.form-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.checkbox-row input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.checkbox-row label{font-size:13px;color:var(--text2);cursor:pointer}

/* ── KPI PILL ── */
.kpi-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;font-size:12px;white-space:nowrap}
.kpi-pill svg{width:13px;height:13px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px}
.empty-icon{width:52px;height:52px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty-icon svg{width:24px;height:24px;color:var(--text3)}
.empty h3{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:5px}
.empty p{font-size:12.5px;color:var(--text3);max-width:260px;margin:0 auto;line-height:1.5}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:100px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

/* ── TOAST ── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:12px 16px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4);pointer-events:all;animation:slide-in .25s ease;max-width:320px}
.toast.success{border-color:var(--green-border)}
.toast.error{border-color:var(--red-border)}
.toast svg{width:16px;height:16px;flex-shrink:0}
@keyframes slide-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── MISC ── */

}

function showToast(msg, type='success') {

  const icon = type==='success'?'<svg viewBox="0 0 24 24" fill="var(--green)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14l-4-4 1.41-1.41L10 13.17l6.59-6.59L18 8l-8 8z"/></svg>':'<svg viewBox="0 0 24 24" fill="var(--red)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';

  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 3500);

  if(!data.length){showToast('No data to export','error');return;}
  const headers = Object.keys(data[0]);
  const rows = data.map(r=>headers.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = filename;
  a.click();
  showToast(`Exported ${data.length} records`);
}

function updateBadges() {
  const pending = S.transfers.filter(t=>t.status==='pending').length;
  const pb = $('pending-badge');
  if(pb){ pb.textContent=pending; pb.style.display=pending?'':'none'; }
  const maintDue = S.maintenance.filter(m=>m.status==='pending'||m.status==='in_progress').length;
  const mb = $('maint-badge');
  if(mb){ mb.textContent=maintDue; mb.style.display=maintDue?'':'none'; }
  const unread = S.notifications.filter(n=>!n.read).length;
  const nd = $('notif-dot');
  if(nd) nd.style.display = unread?'':'none';
}

// NAVIGATION
// ═══════════════════════════════════════════════════════
let currentPage = 'dashboard';
let currentFilter = 'all';
let searchQ = '';
let modalMode = null;
let editId = null;
let activeCharts = [];

function destroyCharts() {
  activeCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  activeCharts = [];
}

function nav(page, el) {
  destroyCharts();
  currentPage = page;
  currentFilter = 'all';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  const info = {
    dashboard:{title:'Fleet Dashboard',sub:'Welcome back — here\'s your fleet overview'},
    analytics:{title:'Analytics & Reports',sub:'Fleet performance metrics and trends'},
    fleet:{title:'Fleet Management',sub:'Manage your vehicle inventory'},
    transfers:{title:'Vehicle Transfers',sub:'Track and manage inter-cost-center transfers'},
    maintenance:{title:'Maintenance Tracker',sub:'Schedule and monitor vehicle servicing'},
    drivers:{title:'Driver Management',sub:'Manage licensed drivers and assignments'},
    costcenters:{title:'Cost Centers',sub:'Manage organizational cost centers'},
    settings:{title:'Settings',sub:'Configure your Fleet Ops platform'},
  };
  const p = info[page];
  $('page-info').innerHTML = `<div class="page-title">${p.title}</div><div class="page-sub">${p.sub}</div>`;
  const btnMap = {fleet:'Add Vehicle',transfers:'New Transfer',maintenance:'Schedule Maintenance',drivers:'Add Driver',costcenters:'Add Cost Center'};
  const btn = $('main-btn');
  if(btnMap[page]){btn.style.display='inline-flex';$('main-btn-lbl').textContent=btnMap[page];}
  else btn.style.display='none';
  render();
}

function doSearch(v) {
  searchQ = v.toLowerCase();
  if(['fleet','drivers','transfers'].includes(currentPage)) render();
}

function render() {
  const c = $('page');

}

function stat(lbl, color, icon, val, trend, dir) {
  const arrow = dir==='up'?'↑':dir==='down'?'↓':'→';
  return `<div class="stat">
    <div class="stat-top">
      <div class="stat-icon" style="background:${color}22">${icon.replace('fill="currentColor"',`fill="${color}"`)}</div>
      <span class="stat-trend ${dir}">${arrow} ${trend}</span>
    </div>
    <div class="stat-label">${lbl}</div>
    <div class="stat-value">${val}</div>
  </div>`;
}

    </div>
  </div>
  ${list.length===0?`<div class="card">${emptyState('No transfers found','Adjust filters or create a new transfer')}</div>`:
  `<div style="display:flex;flex-direction:column;gap:10px">${list.map(t=>{
    const v=S.vehicles.find(x=>x.id===t.vehicleId);
    return`<div class="tcard">
      <div class="tcard-top">

        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

        </div>
      </div>
      ${t.reason?`<div style="font-size:12.5px;color:var(--text3);margin-bottom:8px"><b style="color:var(--text2)">Reason:</b> ${t.reason}</div>`:''}

        <span>Requested by: <b style="color:var(--text2)">${t.reqBy}</b></span>

        ${t.completedAt?`<span>Completed: <b style="color:var(--text2)">${fmtDate(t.completedAt)}</b></span>`:''}
      </div>
    </div>`;

}

function approveTransfer(id) {
  const t = S.transfers.find(x=>x.id===id);
  if(!t) return;
  t.status = 'completed';
  t.approvedBy = 'Hassan Zarroug';
  t.completedAt = new Date().toISOString();
  const v = S.vehicles.find(x=>x.id===t.vehicleId);
  if(v) v.ccId = t.toCcId;
  save(); render(); showToast('Transfer approved and completed');
}
function cancelTransfer(id) {
  if(!confirm('Cancel this transfer?')) return;
  S.transfers.find(x=>x.id===id).status = 'cancelled';
  save(); render(); showToast('Transfer cancelled');
}

function completeMaint(id) {
  const m = S.maintenance.find(x=>x.id===id);
  if(!m) return;
  m.status = 'completed';
  m.completedDate = new Date().toISOString().split('T')[0];
  m.actualCost = m.estimatedCost;
  const v = S.vehicles.find(x=>x.id===m.vehicleId);
  if(v) { v.lastService = m.completedDate; if(v.status==='maintenance') v.status='available'; }
  save(); render(); showToast('Maintenance marked complete');
}
function delMaint(id) {
  if(!confirm('Delete this maintenance record?')) return;
  S.maintenance = S.maintenance.filter(x=>x.id!==id);
  save(); render(); showToast('Record deleted');
}

function delDriver(id) {
  if(!confirm('Remove this driver?')) return;

}

function delCC(id) {

  S.costCenters = S.costCenters.filter(x=>x.id!==id);
  save(); render(); showToast('Cost center deleted');
}

function toggleNotifs() {

}
function renderNotifs() {
  const iconMap = {warning:'var(--amber)',info:'var(--accent2)',success:'var(--green)',error:'var(--red)'};
  $('notif-list').innerHTML = S.notifications.map(n=>`
  <div class="notif-item ${n.read?'':'unread'}" onclick="S.notifications.find(x=>x.id===${n.id}).read=true;save();renderNotifs();updateBadges()">

function markAllRead() {

}

// ═══════════════════════════════════════════════════════
function openMainModal() {
  const m = {fleet:openVehicleModal,transfers:openTransferModal,maintenance:openMaintModal,drivers:openDriverModal,costcenters:openCCModal};
  (m[currentPage]||openVehicleModal)();
}
function showModal(title, body, submitLbl='Save') {
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = body;
  $('modal-submit').textContent = submitLbl;
  $('modal').classList.add('open');
}
function closeModal() { $('modal').classList.remove('open'); modalMode=null; editId=null; }

// Vehicle Modal
function openVehicleModal() { modalMode='vehicle'; editId=null; showModal('Add New Vehicle', vehicleForm()); }
function openEditVehicle(id) { modalMode='vehicle'; editId=id; showModal('Edit Vehicle', vehicleForm(S.vehicles.find(x=>x.id===id))); }

    <div class="form-row"><label class="form-label">From Cost Center</label><select class="form-input" id="t-from"><option value="">Unassigned / Pool</option>${ccOpts}</select></div>

// Submit modal
function submitModal() {
  const fv = id => $(id)?.value?.trim()||'';
  const fn = id => parseFloat($(id)?.value)||0;
  const fi = id => parseInt($(id)?.value)||null;

  if(modalMode==='vehicle') {
    if(!fv('v-make')||!fv('v-model')||!fv('v-plate')||!fv('v-fleet')){showToast('Please fill required fields','error');return;}
    const d = {make:fv('v-make'),model:fv('v-model'),year:fi('v-year')||2024,plate:fv('v-plate'),vin:fv('v-vin')||'VIN'+Date.now(),fleet:fv('v-fleet'),status:fv('v-status')||'available',ccId:fi('v-cc'),mileage:fn('v-mileage'),fuel:fv('v-fuel'),type:fv('v-type'),driverId:fi('v-driver'),lastService:fv('v-lastsvc'),nextService:fv('v-nextsvc'),notes:fv('v-notes')};
    if(editId) Object.assign(S.vehicles.find(x=>x.id===editId),d);
    else{d.id=nextId(S.vehicles);S.vehicles.push(d);}
    showToast(editId?'Vehicle updated':'Vehicle added');

  } else if(modalMode==='transfer') {
    if(!fi('t-vehicle')||!fi('t-to')){showToast('Please select vehicle and destination','error');return;}
    const d = {vehicleId:fi('t-vehicle'),fromCcId:fi('t-from'),toCcId:fi('t-to'),status:'pending',reason:fv('t-reason'),reqBy:fv('t-by')||'Fleet Manager',approvedBy:null,createdAt:new Date().toISOString(),completedAt:null};
    d.id=nextId(S.transfers);S.transfers.unshift(d);
    showToast('Transfer request created');

  } else if(modalMode==='maintenance') {
    if(!fi('m-vehicle')||!fv('m-type')||!fv('m-date')){showToast('Please fill required fields','error');return;}
    const d = {vehicleId:fi('m-vehicle'),type:fv('m-type'),status:'scheduled',priority:fv('m-priority')||'medium',scheduledDate:fv('m-date'),completedDate:null,technicianName:fv('m-tech'),estimatedCost:fn('m-cost'),actualCost:null,notes:fv('m-notes')};
    d.id=nextId(S.maintenance);S.maintenance.push(d);
    const v=S.vehicles.find(x=>x.id===d.vehicleId);
    if(v&&(d.priority==='critical'||d.priority==='high')) v.status='maintenance';
    showToast('Maintenance scheduled');

  } else if(modalMode==='driver') {
    if(!fv('d-name')||!fv('d-lic')){showToast('Please fill required fields','error');return;}
    const d = {name:fv('d-name'),license:fv('d-lic'),phone:fv('d-phone'),email:fv('d-email'),status:fv('d-status')||'active',vehicleId:fi('d-vehicle'),joinDate:fv('d-join'),trips:0,color:fv('d-color')||'#4f8ef7'};
    if(editId){const ex=S.drivers.find(x=>x.id===editId);d.trips=ex.trips;Object.assign(ex,d);}
    else{d.id=nextId(S.drivers);S.drivers.push(d);}
    if(d.vehicleId){const v=S.vehicles.find(x=>x.id===d.vehicleId);if(v)v.driverId=editId||d.id;}
    showToast(editId?'Driver updated':'Driver added');

  } else if(modalMode==='costcenter') {
    if(!fv('cc-name')||!fv('cc-code')){showToast('Please fill required fields','error');return;}
    const d = {name:fv('cc-name'),code:fv('cc-code'),desc:fv('cc-desc'),budget:fn('cc-budget'),spent:fn('cc-spent'),active:$('cc-active')?.checked!==false};
    if(editId) Object.assign(S.costCenters.find(x=>x.id===editId),d);
    else{d.id=nextId(S.costCenters);S.costCenters.push(d);}
    showToast(editId?'Cost center updated':'Cost center added');
  }

  save(); closeModal(); render();
}

// Delete vehicle
function delVehicle(id) {
  if(!confirm('Delete this vehicle? This cannot be undone.')) return;
  S.vehicles = S.vehicles.filter(x=>x.id!==id);
  S.transfers = S.transfers.filter(x=>x.vehicleId!==id);
  S.maintenance = S.maintenance.filter(x=>x.vehicleId!==id);
  save(); render(); showToast('Vehicle deleted');
}

// ═══════════════════════════════════════════════════════
// CHARTS (Chart.js)
// ═══════════════════════════════════════════════════════
function chartDefaults() {
  return {
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2335',titleColor:'#e2e5f3',bodyColor:'#8b92b8',borderColor:'#313757',borderWidth:1,padding:10}},
    scales:{x:{grid:{color:'#252a3d'},ticks:{color:'#555e84',font:{size:11}}},y:{grid:{color:'#252a3d'},ticks:{color:'#555e84',font:{size:11}}}}
  };
}

function initCharts() {
  if(currentPage==='analytics') {
    const bySt = {available:0,in_use:0,maintenance:0,out_of_service:0};
    S.vehicles.forEach(x=>{if(bySt[x.status]!==undefined)bySt[x.status]++;});
    const byType = {};S.vehicles.forEach(v=>{byType[v.type]=(byType[v.type]||0)+1;});
    const byFuel = {};S.vehicles.forEach(v=>{byFuel[v.fuel]=(byFuel[v.fuel]||0)+1;});

    const donutOpts = (labels,data,colors)=>({type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#12151f',hoverOffset:4}]},options:{plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2335',titleColor:'#e2e5f3',bodyColor:'#8b92b8',borderColor:'#313757',borderWidth:1}},cutout:'68%',animation:{duration:600}}});

    mkChart('c-status',donutOpts(['Available','In Use','Maintenance','Out of Service'],[bySt.available,bySt.in_use,bySt.maintenance,bySt.out_of_service],['#2ecc71','#4f8ef7','#f39c12','#e74c3c']));
    mkChart('c-type',donutOpts(Object.keys(byType),Object.values(byType),['#4f8ef7','#9b59b6','#1abc9c','#f39c12']));
    mkChart('c-fuel',donutOpts(Object.keys(byFuel),Object.values(byFuel),['#4f8ef7','#2ecc71','#9b59b6','#f39c12']));

    const sorted = [...S.vehicles].sort((a,b)=>(b.mileage||0)-(a.mileage||0)).slice(0,8);
    mkChart('c-mileage',{type:'bar',data:{labels:sorted.map(v=>v.fleet),datasets:[{data:sorted.map(v=>v.mileage||0),backgroundColor:'#4f8ef744',borderColor:'#4f8ef7',borderWidth:2,borderRadius:4}]},options:{...chartDefaults(),plugins:{...chartDefaults().plugins}}});

    const activeCCs = S.costCenters.filter(c=>c.active);
    mkChart('c-budget',{type:'bar',data:{labels:activeCCs.map(c=>c.code),datasets:[{label:'Budget',data:activeCCs.map(c=>c.budget),backgroundColor:'#4f8ef722',borderColor:'#4f8ef7',borderWidth:2,borderRadius:4},{label:'Spent',data:activeCCs.map(c=>c.spent),backgroundColor:'#2ecc7122',borderColor:'#2ecc71',borderWidth:2,borderRadius:4}]},options:{...chartDefaults(),plugins:{legend:{display:true,labels:{color:'#8b92b8',font:{size:11}}},tooltip:{backgroundColor:'#1f2335',titleColor:'#e2e5f3',bodyColor:'#8b92b8',borderColor:'#313757',borderWidth:1}}}});
  }
}

function mkChart(id, cfg) {
  const el = $(id);
  if(!el) return;
  try {
    const c = new Chart(el, cfg);
    activeCharts.push(c);
  } catch(e){}
}

}

  const panel = $('notif-panel');

updateBadges();
render();
